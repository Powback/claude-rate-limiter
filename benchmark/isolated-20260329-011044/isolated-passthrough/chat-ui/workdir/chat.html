<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMessage Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: #000;
            border: 1px solid #222;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #222;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 13px;
            color: #8e8e93;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background-color: #000;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .message-group.sent {
            align-items: flex-end;
        }

        .message-group.received {
            align-items: flex-start;
        }

        .message-time {
            font-size: 12px;
            color: #8e8e93;
            margin: 4px 8px 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message-group:hover .message-time {
            opacity: 1;
        }

        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.4;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            background-color: #0084ff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background-color: #262628;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            background-color: #262628;
            padding: 8px 12px;
            border-radius: 20px;
            width: fit-content;
            animation: messageSlide 0.3s ease;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #8e8e93;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-area {
            padding: 12px 16px 20px;
            border-top: 1px solid #222;
            background-color: #000;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: #262628;
            border-radius: 20px;
            padding: 0 16px;
            border: 1px solid #363638;
            transition: border-color 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: #0084ff;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            padding: 10px 0;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        #messageInput::placeholder {
            color: #8e8e93;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #0084ff;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, transform 0.1s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background-color: #0073e6;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background-color: #404042;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8e8e93;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-state span {
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Alex</h1>
            <p>Active now</p>
        </div>

        <div class="messages" id="messagesContainer">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <p>No messages yet</p>
                <span>Start a conversation</span>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Message"
                    autocomplete="off"
                />
            </div>
            <button class="send-btn" id="sendBtn" disabled title="Send">
                ↑
            </button>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let isTyping = false;

        // Load demo messages on page load
        window.addEventListener('load', () => {
            addDemoMessages();
        });

        function addDemoMessages() {
            const demos = [
                { type: 'received', text: 'Hey! How are you?' },
                { type: 'sent', text: 'Hi! Doing great, thanks for asking 😊' },
                { type: 'received', text: 'That\'s awesome!' },
                { type: 'received', text: 'Want to grab coffee later?' },
            ];

            // Clear empty state
            messagesContainer.innerHTML = '';

            demos.forEach((msg, index) => {
                setTimeout(() => {
                    addMessage(msg.text, msg.type);
                }, index * 600);
            });
        }

        function addMessage(text, type = 'sent') {
            // Remove empty state if it exists
            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const group = document.createElement('div');
            group.className = `message-group ${type}`;

            const now = new Date();
            const timeStr = now.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit',
            });

            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            messageEl.textContent = text;

            const timeEl = document.createElement('div');
            timeEl.className = 'message-time';
            timeEl.textContent = timeStr;

            group.appendChild(messageEl);
            group.appendChild(timeEl);
            messagesContainer.appendChild(group);

            // Auto-scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            if (isTyping) return;
            isTyping = true;

            const group = document.createElement('div');
            group.className = 'message-group received';

            const typingEl = document.createElement('div');
            typingEl.className = 'typing-indicator';
            typingEl.id = 'typingIndicator';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                typingEl.appendChild(dot);
            }

            group.appendChild(typingEl);
            messagesContainer.appendChild(group);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typingIndicator');
            if (typing) {
                typing.closest('.message-group').remove();
                isTyping = false;
            }
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'sent');
            messageInput.value = '';
            updateSendButton();

            // Simulate response
            setTimeout(() => {
                showTypingIndicator();

                setTimeout(() => {
                    removeTypingIndicator();
                    const responses = [
                        'That sounds great!',
                        'I totally agree 😄',
                        'Let me know!',
                        'Awesome, thanks!',
                        'Perfect! See you then 👋',
                    ];
                    const randomResponse =
                        responses[Math.floor(Math.random() * responses.length)];
                    addMessage(randomResponse, 'received');
                }, 800 + Math.random() * 1200);
            }, 500);
        }

        function updateSendButton() {
            const hasText = messageInput.value.trim().length > 0;
            sendBtn.disabled = !hasText;
        }

        // Event listeners
        messageInput.addEventListener('input', updateSendButton);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
    </script>
</body>
</html>
