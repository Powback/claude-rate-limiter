<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #1a1a1a;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #333;
            background: #121212;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header-info {
            font-size: 12px;
            color: #888;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        .message-group.sent {
            align-items: flex-end;
        }

        .message-group.received {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            word-break: break-word;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble.sent {
            background: #0084ff;
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .message-bubble.received {
            background: #3a3a3a;
            border-bottom-left-radius: 4px;
            color: #fff;
        }

        .message-timestamp {
            font-size: 11px;
            color: #888;
            padding: 0 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: #3a3a3a;
            border-radius: 20px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-container {
            padding: 16px 20px;
            border-top: 1px solid #333;
            background: #121212;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2a2a2a;
            border-radius: 20px;
            padding: 10px 16px;
            border: 1px solid #333;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #0084ff;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            resize: none;
            max-height: 100px;
            outline: none;
            font-family: inherit;
        }

        .input-field::placeholder {
            color: #888;
        }

        .send-button {
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-button:hover:not(:disabled) {
            background: #0073e6;
        }

        .send-button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .date-separator {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin: 16px 0;
            position: relative;
        }

        .date-separator::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: #333;
            z-index: 0;
        }

        .date-separator span {
            background: #1a1a1a;
            padding: 0 8px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h1>Chat</h1>
                <div class="chat-header-info">Active now</div>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="date-separator">
                <span>Today</span>
            </div>

            <div class="message-group received">
                <div class="message-bubble received">Hey, how are you doing?</div>
                <div class="message-timestamp">2:30 PM</div>
            </div>

            <div class="message-group sent">
                <div class="message-bubble sent">Hi! I'm doing great, thanks for asking!</div>
                <div class="message-timestamp">2:31 PM</div>
            </div>

            <div class="message-group sent">
                <div class="message-bubble sent">How about you?</div>
                <div class="message-timestamp">2:31 PM</div>
            </div>

            <div class="message-group received">
                <div class="message-bubble received">Doing well! Just finished up some work</div>
                <div class="message-timestamp">2:32 PM</div>
            </div>

            <div class="message-group received">
                <div class="message-bubble received">Thinking about grabbing lunch soon</div>
                <div class="message-timestamp">2:32 PM</div>
            </div>

            <div class="message-group sent">
                <div class="message-bubble sent">That sounds nice! Want some company?</div>
                <div class="message-timestamp">2:33 PM</div>
            </div>

            <div class="message-group received" id="typingGroup" style="display: none;">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    class="input-field"
                    placeholder="Message..."
                    rows="1"
                ></textarea>
            </div>
            <button class="send-button" id="sendButton" disabled>
                →
            </button>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const messagesContainer = document.getElementById('messagesContainer');
        const typingGroup = document.getElementById('typingGroup');

        // Enable/disable send button based on input
        messageInput.addEventListener('input', () => {
            const hasText = messageInput.value.trim().length > 0;
            sendButton.disabled = !hasText;
        });

        // Handle auto-grow textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        // Send message on enter (shift+enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send message on button click
        sendButton.addEventListener('click', sendMessage);

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // Add sent message
            const messageGroup = document.createElement('div');
            messageGroup.className = 'message-group sent';
            messageGroup.innerHTML = `
                <div class="message-bubble sent">${escapeHtml(text)}</div>
                <div class="message-timestamp">${getCurrentTime()}</div>
            `;
            messagesContainer.appendChild(messageGroup);

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendButton.disabled = true;

            // Scroll to bottom
            scrollToBottom();

            // Simulate typing indicator
            setTimeout(() => {
                typingGroup.style.display = 'flex';
                scrollToBottom();
            }, 500);

            // Simulate received message
            setTimeout(() => {
                typingGroup.style.display = 'none';

                const responses = [
                    'That sounds great!',
                    'I totally agree',
                    'Haha, nice one! 😄',
                    'Definitely!',
                    'You know it!',
                    'For sure, let\'s do it',
                    'I couldn\'t agree more'
                ];

                const randomResponse = responses[Math.floor(Math.random() * responses.length)];

                const receivedGroup = document.createElement('div');
                receivedGroup.className = 'message-group received';
                receivedGroup.innerHTML = `
                    <div class="message-bubble received">${randomResponse}</div>
                    <div class="message-timestamp">${getCurrentTime()}</div>
                `;
                messagesContainer.appendChild(receivedGroup);

                scrollToBottom();
            }, 2000);
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            return `${hours}:${minutes} ${ampm}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Scroll to bottom on load
        scrollToBottom();
    </script>
</body>
</html>
