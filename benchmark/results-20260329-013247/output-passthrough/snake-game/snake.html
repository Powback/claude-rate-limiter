<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .info-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .score-display, .status-display {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }

        canvas {
            border: 3px solid #667eea;
            background-color: #f0f0f0;
            display: block;
            margin: 0 auto 20px;
            cursor: none;
        }

        .controls {
            margin: 20px 0;
            color: #666;
            font-size: 0.95em;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .game-over-content h2 {
            font-size: 2.5em;
            color: #764ba2;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 30px;
        }

        .game-over-content button {
            padding: 15px 40px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>

        <div class="info-bar">
            <div class="score-display">Score: <span id="score">0</span></div>
            <div class="status-display">Level: <span id="level">1</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <p>Use <strong>arrow keys</strong> to move • Eat the red food to grow</p>
        </div>

        <button id="restartBtn">Restart Game</button>
    </div>

    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-content">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="gameOverRestartBtn">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameOverRestartBtn = document.getElementById('gameOverRestartBtn');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const finalScoreDisplay = document.getElementById('finalScore');

        // Game constants
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;

        // Game state
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let score = 0;
        let level = 1;
        let gameRunning = true;
        let gameOver = false;
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};

        // Initialize food at random position
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
        }

        // Update game state
        function update() {
            if (gameOver || !gameRunning) return;

            // Update direction
            direction = nextDirection;

            // Calculate new head position
            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= TILE_COUNT || newHead.y < 0 || newHead.y >= TILE_COUNT) {
                endGame();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (newHead.x === segment.x && newHead.y === segment.y) {
                    endGame();
                    return;
                }
            }

            // Add new head
            snake.unshift(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                level = Math.floor(score / 50) + 1;
                scoreDisplay.textContent = score;
                levelDisplay.textContent = level;
                spawnFood();
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                if (i === 0) {
                    // Head
                    ctx.fillStyle = '#2ecc71';
                } else {
                    // Body
                    ctx.fillStyle = '#27ae60';
                }
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            }

            // Draw food
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();

            const frameDelay = Math.max(50, 200 - (level - 1) * 15);
            setTimeout(gameLoop, frameDelay);
        }

        // End game
        function endGame() {
            gameOver = true;
            gameRunning = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        // Restart game
        function restartGame() {
            snake = [{x: 10, y: 10}];
            spawnFood();
            score = 0;
            level = 1;
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            gameRunning = true;
            gameOver = false;
            scoreDisplay.textContent = score;
            levelDisplay.textContent = level;
            gameOverScreen.style.display = 'none';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gameOver) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
            }
        });

        // Button controls
        restartBtn.addEventListener('click', restartGame);
        gameOverRestartBtn.addEventListener('click', restartGame);

        // Start game
        gameLoop();
    </script>
</body>
</html>
