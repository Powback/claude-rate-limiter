<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMessage Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .chat-header {
            padding: 16px;
            background: #1c1c1e;
            border-bottom: 1px solid #3a3a3c;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 17px;
            font-weight: 600;
        }

        .chat-header .status {
            font-size: 13px;
            color: #8e8e93;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #454547;
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #545456;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 12px;
        }

        .message-group.sent {
            align-items: flex-end;
        }

        .message-group.received {
            align-items: flex-start;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.4;
            animation: messageIn 0.3s ease-out;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            background: #0084ff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: #3a3a3c;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 4px;
            padding: 0 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #3a3a3c;
            padding: 8px 12px;
            border-radius: 18px;
            width: fit-content;
            animation: messageIn 0.3s ease-out;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8e8e93;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-container {
            padding: 12px 16px 20px;
            background: #000;
            border-top: 1px solid #3a3a3c;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1c1c1e;
            border-radius: 20px;
            padding: 10px 16px;
            border: 1px solid #3a3a3c;
        }

        .input-box:focus-within {
            border-color: #0084ff;
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
        }

        .input-box textarea::placeholder {
            color: #8e8e93;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0084ff;
            border: none;
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: #0073e6;
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .plus-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0084ff;
            border: none;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .plus-btn:hover {
            background: #0073e6;
        }

        .plus-btn:active {
            transform: scale(0.95);
        }

        /* Date separator */
        .date-separator {
            text-align: center;
            margin: 16px 0;
            color: #8e8e93;
            font-size: 12px;
        }

        .date-separator span {
            background: #000;
            padding: 0 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h1>Messages</h1>
                <div class="status">Active now</div>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="date-separator">
                <span>Today</span>
            </div>

            <!-- Sample messages -->
            <div class="message-group received">
                <div class="message received">Hey! How are you?</div>
                <div class="message-time">9:42 AM</div>
            </div>

            <div class="message-group sent">
                <div class="message sent">I'm doing great, thanks for asking!</div>
                <div class="message-time">9:43 AM</div>
            </div>

            <div class="message-group sent">
                <div class="message sent">Just working on some cool projects</div>
                <div class="message-time">9:43 AM</div>
            </div>

            <div class="message-group received">
                <div class="message received">That sounds awesome! What are you building?</div>
                <div class="message-time">9:44 AM</div>
            </div>

            <div class="message-group sent">
                <div class="message sent">Creating a chat UI that looks like iMessage</div>
                <div class="message-time">9:45 AM</div>
            </div>

            <div class="message-group sent">
                <div class="message sent">Using pure HTML, CSS, and JavaScript</div>
                <div class="message-time">9:45 AM</div>
            </div>

            <div class="message-group received">
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <button class="plus-btn" title="Add attachment">+</button>
            <div class="input-box">
                <textarea id="messageInput" placeholder="iMessage" rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" disabled title="Send message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messagesContainer');

        // Auto-grow textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
            updateSendButton();
        });

        // Update send button state
        function updateSendButton() {
            sendBtn.disabled = !messageInput.value.trim();
        }

        // Handle Enter key (Shift+Enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send button click
        sendBtn.addEventListener('click', sendMessage);

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // Remove typing indicator if present
            const typingIndicator = messagesContainer.querySelector('.typing-indicator');
            if (typingIndicator) {
                typingIndicator.closest('.message-group').remove();
            }

            // Add sent message
            const sentGroup = document.createElement('div');
            sentGroup.className = 'message-group sent';

            const sentMsg = document.createElement('div');
            sentMsg.className = 'message sent';
            sentMsg.textContent = text;

            const sentTime = document.createElement('div');
            sentTime.className = 'message-time';
            sentTime.textContent = getCurrentTime();

            sentGroup.appendChild(sentMsg);
            sentGroup.appendChild(sentTime);
            messagesContainer.appendChild(sentGroup);

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            updateSendButton();

            // Scroll to bottom
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 0);

            // Simulate received message with typing indicator
            setTimeout(() => {
                addTypingIndicator();

                setTimeout(() => {
                    removeTypingIndicator();
                    addReceivedMessage('That\'s pretty cool! 😎');
                }, 1500);
            }, 800);
        }

        function addTypingIndicator() {
            const typingGroup = document.createElement('div');
            typingGroup.className = 'message-group received';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                typingDiv.appendChild(dot);
            }

            typingGroup.appendChild(typingDiv);
            messagesContainer.appendChild(typingGroup);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingGroup = messagesContainer.querySelector('.typing-indicator')?.closest('.message-group');
            if (typingGroup) {
                typingGroup.remove();
            }
        }

        function addReceivedMessage(text) {
            const receivedGroup = document.createElement('div');
            receivedGroup.className = 'message-group received';

            const receivedMsg = document.createElement('div');
            receivedMsg.className = 'message received';
            receivedMsg.textContent = text;

            const receivedTime = document.createElement('div');
            receivedTime.className = 'message-time';
            receivedTime.textContent = getCurrentTime();

            receivedGroup.appendChild(receivedMsg);
            receivedGroup.appendChild(receivedTime);
            messagesContainer.appendChild(receivedGroup);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function getCurrentTime() {
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            return `${hours}:${minutes} ${ampm}`;
        }

        // Initial focus
        messageInput.focus();
    </script>
</body>
</html>
