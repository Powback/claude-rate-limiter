<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/dist/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/atom-one-dark.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background: #ddd;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .header {
            padding: 16px;
            background: #2c3e50;
            color: white;
            font-weight: 600;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            flex: 1;
            padding: 20px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            border: none;
            resize: none;
            outline: none;
            background: white;
        }

        .preview {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }

        /* Markdown content styling */
        .preview h1 {
            font-size: 2em;
            margin: 0.67em 0;
            font-weight: 600;
            border-bottom: 2px solid #eee;
            padding-bottom: 0.3em;
        }

        .preview h2 {
            font-size: 1.5em;
            margin: 0.75em 0;
            font-weight: 600;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.3em;
        }

        .preview h3 {
            font-size: 1.25em;
            margin: 0.83em 0;
            font-weight: 600;
        }

        .preview h4 {
            font-size: 1em;
            margin: 1em 0;
            font-weight: 600;
        }

        .preview h5 {
            font-size: 0.875em;
            margin: 1.17em 0;
            font-weight: 600;
        }

        .preview h6 {
            font-size: 0.75em;
            margin: 1.33em 0;
            font-weight: 600;
            color: #666;
        }

        .preview p {
            margin: 1em 0;
            line-height: 1.6;
            color: #333;
        }

        .preview strong {
            font-weight: 600;
            color: #2c3e50;
        }

        .preview em {
            font-style: italic;
            color: #555;
        }

        .preview a {
            color: #0066cc;
            text-decoration: none;
            border-bottom: 1px dotted #0066cc;
        }

        .preview a:hover {
            background: #f0f8ff;
        }

        .preview code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
            color: #d63384;
        }

        .preview pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 6px;
            margin: 1em 0;
            overflow-x: auto;
            line-height: 1.5;
        }

        .preview pre code {
            background: none;
            padding: 0;
            color: inherit;
        }

        .preview ul, .preview ol {
            margin: 1em 0;
            padding-left: 2em;
            color: #333;
        }

        .preview li {
            margin: 0.5em 0;
            line-height: 1.6;
        }

        .preview blockquote {
            border-left: 4px solid #ddd;
            padding-left: 1em;
            margin: 1em 0;
            color: #666;
            font-style: italic;
        }

        .preview hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 2em 0;
        }

        .preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        .preview table th,
        .preview table td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        .preview table th {
            background: #f5f5f5;
            font-weight: 600;
        }

        /* Scrollbar styling */
        .preview::-webkit-scrollbar,
        textarea::-webkit-scrollbar {
            width: 8px;
        }

        .preview::-webkit-scrollbar-track,
        textarea::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .preview::-webkit-scrollbar-thumb,
        textarea::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .preview::-webkit-scrollbar-thumb:hover,
        textarea::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pane">
            <div class="header">Markdown Input</div>
            <textarea id="markdown-input" placeholder="# Write your markdown here...

## Features
- **Bold text** with **double asterisks**
- *Italic text* with *single asterisks*
- [Links](https://example.com)
- \`inline code\` with backticks

### Code Blocks
\`\`\`javascript
function hello() {
  console.log('Hello, World!');
}
\`\`\`

### Lists
1. Ordered item 1
2. Ordered item 2

- Unordered item 1
- Unordered item 2
"></textarea>
        </div>
        <div class="pane">
            <div class="header">Preview</div>
            <div class="preview" id="preview"></div>
        </div>
    </div>

    <script>
        // Configure marked options
        marked.setOptions({
            breaks: true,
            gfm: true,
            pedantic: false,
            headerIds: true,
            mangle: false
        });

        // Override code block rendering to use highlight.js
        const renderer = new marked.Renderer();
        renderer.codespan = (code) => {
            return `<code>${code}</code>`;
        };
        renderer.code = (code, language) => {
            const validLanguage = hljs.getLanguage(language) ? language : 'plaintext';
            const highlighted = hljs.highlight(code, { language: validLanguage }).value;
            return `<pre><code class="language-${validLanguage}">${highlighted}</code></pre>`;
        };
        marked.setOptions({ renderer });

        const markdownInput = document.getElementById('markdown-input');
        const preview = document.getElementById('preview');

        // Function to update preview
        function updatePreview() {
            const markdown = markdownInput.value;
            const html = marked.parse(markdown);
            preview.innerHTML = html;
        }

        // Update preview on input
        markdownInput.addEventListener('input', updatePreview);

        // Initial preview
        updatePreview();
    </script>
</body>
</html>
